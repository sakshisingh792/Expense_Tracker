{% extends 'expenses/base.html' %}

{% block content %}
    <h2>✏️ Edit Expense</h2>
    <hr style="margin-bottom: 20px;">
    
    <form method="POST" style="max-width: 400px;">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" style="background-color: #f39c12; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; width: 100%;">
            Update Expense
        </button>
    </form>
{% endblock %}
