{% extends 'expenses/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: #0f172a; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; border: 1px solid #1e293b;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color: #f8fafc; margin: 0;">📁 Manage Categories</h2>
        <a href="{% url 'dashboard' %}" style="text-decoration: none; color: #94a3b8; font-weight: bold; font-size: 0.9em; transition: 0.2s;" onmouseover="this.style.color='#f8fafc'" onmouseout="this.style.color='#94a3b8'">
            ← Back
        </a>
    </div>

    <form method="POST" style="margin-bottom: 30px; display: flex; gap: 10px;">
        {% csrf_token %}
        <input type="text" name="name" placeholder="New Category Name..." required style="flex: 1; padding: 12px; background: #1e293b; color: #f8fafc; border: 1px solid #334155; border-radius: 8px; outline: none; font-family: inherit; font-size: 1em; transition: 0.2s;" onfocus="this.style.borderColor='#3b82f6'">
        
        <button type="submit" style="background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);" onmouseover="this.style.backgroundColor='#2563eb'">
            Add
        </button>
    </form>

    <h3 style="color: #e2e8f0; border-bottom: 1px solid #1e293b; padding-bottom: 10px; margin-bottom: 0;">Your Active Categories</h3>
    
    <ul style="list-style: none; padding: 0; margin: 0;">
        {% for category in categories %}
        <li style="padding: 18px 10px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 12px; color: #60a5fa; font-weight: 600; font-size: 1.1em; letter-spacing: 0.5px;">
            <span style="font-size: 1.2em;">📁</span> {{ category.name }}
        </li>
        {% empty %}
        <li style="color: #64748b; padding: 20px 10px; font-style: italic;">No categories yet. Add one above!</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
